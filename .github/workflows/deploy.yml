name: Validate & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validation HTML & tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validation HTML (html-validate)
        uses: Cyb3r-Jak3/html5-validator-action@v1.2.0
        with:
          root: .
          pattern: "*.html"

      - name: Tests liens et balises critiques
        run: node tests/links.test.js

  deploy:
    name: Déploiement FTP (Gandi)
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Déploiement via FTP
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server:   ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_PATH }}
          exclude: |
            **/.git*
            **/.git*/**
            **/seed/**
            **/tests/**
            **/node_modules/**
            README.md
